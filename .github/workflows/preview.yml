name: PR Preview

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'adrs/**'
      - '.gemini/**'
      - '**/README.md'
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  pull-requests: write
  id-token: write # Required for Workload Identity Federation (OIDC)

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  build_drafts_off:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.details_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.2'
          extended: true
      - name: Set up node.
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: './svelte/package-lock.json'
      - name: Build Svelte components
        run: |
          # Build Svelte apps and move generated files into position
          ./svelte/build.sh
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo --source=./hugo --logLevel=debug --minify
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/712907887884/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'ci-service-account@doradotdev.iam.gserviceaccount.com'

      - name: Network Diagnostics
        run: |
          echo "=== 1. Checking DNS Resolution ==="
          nslookup sts.googleapis.com || true
          
          echo "=== 2. Checking Network Interfaces and MTU ==="
          ip addr || true
          ip route || true
          
          echo "=== 3. Testing Small GET request ==="
          curl -I -s https://sts.googleapis.com/ || true
          
          echo "=== 4. Testing Small POST request ==="
          curl -v -X POST https://sts.googleapis.com/v1/token \
            -H "Content-Type: application/json" \
            -d '{"grantType": "urn:ietf:params:oauth:grant-type:token-exchange"}' || true
            
          echo "=== 5. Testing Large POST request (Simulating 2KB OIDC Token) ==="
          DUMMY_PAYLOAD=$(head -c 2000 < /dev/zero | tr '\0' 'a')
          curl -v -X POST https://sts.googleapis.com/v1/token \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"$DUMMY_PAYLOAD\"}" || true

      - name: Deploy to Firebase
        id: deploy
        env:
          NODE_OPTIONS: "--require ${{ github.workspace }}/.github/workflows/disable-fetch.js --dns-result-order=ipv4first"
        run: |
          npx firebase-tools@latest hosting:channel:deploy pr${{ github.event.pull_request.number || 'manual' }}_drafts_off --expires 30d --project doradotdev --debug | tee deploy_output.txt
          PREVIEW_URL=$(grep -oE "https://[a-zA-Z0-9.-]+\.(web\.app|firebaseapp\.com)" deploy_output.txt | head -n 1)
          echo "details_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "Preview URL is: $PREVIEW_URL"

      - name: Comment on PR (Drafts Off)
        if: github.event.pull_request.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "🚀 **Preview (Drafts Off)** deployed successfully! 

          🔗 [View Preview](${{ steps.deploy.outputs.details_url }})"
  build_drafts_on:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.details_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.2'
          extended: true
      - name: Set up node.
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: './svelte/package-lock.json'
      - name: Build Svelte components
        run: |
          # Build Svelte apps and move generated files into position
          ./svelte/build.sh
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo --source=./hugo --logLevel=debug --buildDrafts --minify
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/712907887884/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'ci-service-account@doradotdev.iam.gserviceaccount.com'

      - name: Deploy to Firebase
        id: deploy
        env:
          NODE_OPTIONS: "--require ${{ github.workspace }}/.github/workflows/disable-fetch.js --dns-result-order=ipv4first"
        run: |
          npx firebase-tools@latest hosting:channel:deploy pr${{ github.event.pull_request.number || 'manual' }}_drafts_on --expires 30d --project doradotdev --debug | tee deploy_output.txt
          PREVIEW_URL=$(grep -oE "https://[a-zA-Z0-9.-]+\.(web\.app|firebaseapp\.com)" deploy_output.txt | head -n 1)
          echo "details_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "Preview URL is: $PREVIEW_URL"

      - name: Comment on PR (Drafts On)
        if: github.event.pull_request.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "🚀 **Preview (Drafts On)** deployed successfully! 

          🔗 [View Preview](${{ steps.deploy.outputs.details_url }})"
  # shard tests across multiple workers
  test:
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    runs-on: ubuntu-latest
    needs: build_drafts_on
    defaults:
      run:
        shell: bash
        working-directory: ./test/playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up node.
        uses: actions/setup-node@v6
        with:
          # pin to v22 b/c v24 is causing build issues (https://github.com/dora-team/dora.dev/pull/1431)
          node-version: '22.x'

      - name: Restore cache - playwright binaries
        uses: actions/cache/restore@v5
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('./test/playwright/package-lock.json') }}

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        if: always() && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Save cache - playwright binaries
        if: always() && steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('./test/playwright/package-lock.json') }}

      - name: Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: ${{needs.build_drafts_on.outputs.preview_url}}
        run: |
          set -u
          npx playwright test --max-failures=1 --shard=${{ matrix.shard }}/${{ strategy.job-total }}

  test_redirects:
    runs-on: ubuntu-latest
    needs: build_drafts_on
    defaults:
      run:
        working-directory: ./test/redirects
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/
      - name: Run redirect tests
        env:
          BASE_URL: ${{ needs.build_drafts_on.outputs.preview_url }}
        run: npx mocha test-redirects.js
